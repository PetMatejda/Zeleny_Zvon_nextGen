app = "zeleny-zvon-backend-api"
primary_region = "fra"

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/database.sqlite"

[[mounts]]
  source = "zeleny_zvon_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
